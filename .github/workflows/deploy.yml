name: Test, Build and Deploy to Netlify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies
          path: node_modules
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: dependencies
          path: .

      - name: Run linting
        run: npx oxlint --deny-warnings

  typecheck:
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: dependencies
          path: .

      - name: Run type checking
        run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: dependencies
          path: .

      - name: Run unit tests
        run: npx vitest --run

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: dependencies
          path: .

      - name: Install Cypress binary
        run: npx cypress install

      - name: Run e2e tests
        run: |
          # Start Vite dev server in background
          pnpm run dev &
          DEV_PID=$!

          # Wait for server to be ready (simple check)
          sleep 10

          # Run Cypress tests
          npx cypress run
          CYPRESS_EXIT_CODE=$?

          # Kill the dev server
          kill $DEV_PID

          # Exit with Cypress exit code
          exit $CYPRESS_EXIT_CODE

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: dependencies
          path: .

      - name: Install Netlify CLI
        run: pnpm add -g netlify-cli

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --prod --dir=build
